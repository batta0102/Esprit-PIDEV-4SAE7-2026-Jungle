spring.application.name=GestionCours
server.port=8098

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/gestioncours?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# Hibernate / JPA
# En dev : update crée/met à jour les tables (ne supprime jamais les anciennes).
# Après nettoyage des doublons, exécuter une fois DB_CLEANUP_DUPLICATE_TABLES.sql dans phpMyAdmin.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Noms de tables : utiliser UNIQUEMENT les noms définis dans @Table(name="...") sur chaque entité.
# Pas de pluriel ni d'autre stratégie -> évite les tables en double (online_course vs online_courses).
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl

# Date Format
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=UTC

# Eureka Discovery Service Configuration
eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance-id:${random.value}}
eureka.instance.prefer-ip-address=true
eureka.instance.health-check-url-path=/actuator/health
eureka.instance.status-page-url-path=/actuator/info
