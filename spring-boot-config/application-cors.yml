#         - PUT
#         - DELETE
#         - OPTIONS
#         - PATCH
#       allowed-headers:
#         - "*"
#       allow-credentials: true
#       max-age: 3600

# =============================================================================
# INSTRUCTIONS
# =============================================================================
# 1. Copy the appropriate section above to your application.yml
# 2. Use "spring.cloud.gateway" section for API Gateway (port 8085)
# 3. Use "spring.mvc" section for other services (port 8089, etc.)
# 4. Restart your Spring Boot services
# 5. Test from Angular: add/update/delete should work without CORS errors
# =============================================================================
