# =============================================================================
# CORS Configuration for Spring Cloud Gateway
# =============================================================================
# Add this to your application.yml file in the API Gateway project (port 8085)
# This is an alternative to Java-based configuration (GatewayCorsConfig.java)
# Choose ONE approach: either Java config OR YAML config (not both)
# =============================================================================

spring:
  cloud:
    gateway:
      # Global CORS configuration
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':  # Apply to all routes
            allowedOrigins:
              - "http://localhost:4200"  # Angular Frontend
              - "http://localhost:4300"  # Angular Backend Admin
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

# =============================================================================
# Alternative: Spring MVC CORS Configuration (Non-Gateway)
# =============================================================================
# If you're NOT using Spring Cloud Gateway, use this instead:
# (For Product Service on port 8089 or other Spring MVC services)
# =============================================================================

# spring:
#   mvc:
#     cors:
